# Global settings for RV1106 family (RV1103-inclusive)
#
# The board configs source this wrapper directly, while Armbian later sources
# config/sources/families/${LINUXFAMILY}.conf on its own. Keep the actual
# family boot/source settings in that canonical family file and only layer the
# mpwrd-os family policy here.

# Kernel and boot flow
source "${USERPATCHES_PATH}/config/sources/families/rockchip-rv1106.conf"

# Family-specific extensions (optimizations)
ENABLE_EXTENSIONS="$ENABLE_EXTENSIONS,fixed-eth-mac"
