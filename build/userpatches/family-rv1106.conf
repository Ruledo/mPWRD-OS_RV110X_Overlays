# Global settings for RV1106 family (RV1103-inclusive)

# Kernel
BRANCH=vendor
#BRANCH=current
#BRANCH=edge

# Boot flow
SRC_EXTLINUX="no"
BOOTSCRIPT="boot-rv1106.cmd:boot.cmd"
FORCE_BOOTSCRIPT_UPDATE="yes"
BOOT_OVERLAY_MODE="armbianEnv"

# Family-specific extensions (optimizations)
ENABLE_EXTENSIONS="$ENABLE_EXTENSIONS,fixed-eth-mac"
